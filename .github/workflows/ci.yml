name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        shell: pwsh
        run: go test ./...

      - name: Build application
        shell: pwsh
        run: go build -trimpath -ldflags "-H=windowsgui" ./cmd/better-alt-tab

      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.4
