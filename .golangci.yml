run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - goimports
    - misspell
    - gosec
    - gocyclo
    - gocritic
    - goconst
    - exhaustive
  disable-all: true

linters-settings:
  goimports:
    local-prefixes: quick_app_switcher
