pre-commit:
  parallel: true
  commands:
    golangci-lint:
      glob: "*.go"
      run: golangci-lint run
    go-test:
      glob: "*.go"
      run: go test -short ./...
    nilaway:
      glob: "*.go"
      run: nilaway -include-pkgs="quick_app_switcher" ./...
    go-mod-tidy:
      run: go mod tidy && git --no-pager diff --exit-code go.mod

commit-msg:
  commands:
    conventional-commits:
      run: |
        grep -Eq "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .{1,72}" {1}
      fail_text: "Commit message does not follow Conventional Commits format (e.g., 'feat(scope): description')"
